<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CXO TC8｜台中第 8 分會 成員儀表板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f4f8; color: #222; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #15296B 0%, #1E40A0 58%, #2B57C4 100%); color: white; padding: 30px 40px 26px; display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
  .edit-link { margin-left: auto; align-self: center; background: rgba(255,255,255,.16); border: 1.5px solid rgba(255,255,255,.55); color: #fff; padding: 11px 20px; border-radius: 10px; font-weight: 700; font-size: .92rem; text-decoration: none; white-space: nowrap; transition: background .2s; }
  .edit-link:hover { background: rgba(255,255,255,.30); }
  .logo { width: 112px; height: 112px; border-radius: 20px; flex-shrink: 0; box-shadow: 0 4px 18px rgba(0,0,0,.32); }
  .header-text { flex: 1; }
  .header h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 6px; }
  .header p  { font-size: 1rem; opacity: .85; line-height: 1.6; }
  .stats { display: flex; gap: 32px; margin-top: 20px; }
  .stat { text-align: center; }
  .stat .num { font-size: 2rem; font-weight: 700; }
  .stat .lbl { font-size: .75rem; opacity: .7; margin-top: 2px; }

  /* SEARCH / FILTER */
  .toolbar { background: white; padding: 16px 40px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
             box-shadow: 0 2px 8px rgba(0,0,0,.08); position: sticky; top: 0; z-index: 100; }
  .toolbar input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid #d0d8e4; border-radius: 8px; font-size: .95rem; outline: none; }
  .toolbar input:focus { border-color: #2B57C4; }
  .filter-btn { padding: 8px 16px; border: 1.5px solid #d0d8e4; border-radius: 20px; background: white; cursor: pointer; font-size: .85rem; color: #555; transition: all .2s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { background: #1E40A0; color: white; border-color: #1E40A0; }
  .count-badge { margin-left: auto; background: #15296B; color: white; padding: 6px 14px; border-radius: 16px; font-size: .85rem; white-space: nowrap; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 28px 40px; }

  /* CARD */
  .card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; position: relative; transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; }
  .officer { position: absolute; top: 12px; right: 12px; background: #E76318; color: #fff; font-weight: 700; font-size: .74rem; padding: 3px 11px; border-radius: 11px; box-shadow: 0 1px 5px rgba(0,0,0,.18); z-index: 2; white-space: nowrap; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
  .card.hidden { display: none; }

  .card-top { padding: 20px 20px 14px; border-bottom: 1px solid #f0f4f8; display: flex; gap: 14px; align-items: flex-start; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
             font-size: 1.3rem; font-weight: 700; color: white; flex-shrink: 0; }
  .name-block { flex: 1; }
  .name-block .name { font-size: 1.1rem; font-weight: 700; color: #15296B; margin-bottom: 3px; }
  .name-block .role { font-size: .82rem; color: #888; }
  .industry-tag { font-size: .72rem; padding: 3px 10px; border-radius: 12px; color: white; font-weight: 600; white-space: nowrap; margin-top: 2px; display: inline-block; }

  .card-company { padding: 12px 20px; background: #f7f9fc; border-bottom: 1px solid #f0f4f8; }
  .card-company .co-name { font-size: .95rem; font-weight: 600; color: #1E40A0; margin-bottom: 2px; }
  .card-company .co-title { font-size: .82rem; color: #666; }

  .card-desc { padding: 14px 20px; font-size: .85rem; line-height: 1.65; color: #444; flex: 1; }

  .card-footer { padding: 12px 20px; border-top: 1px solid #f0f4f8; display: flex; align-items: center; gap: 10px; }
  .web-link { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: #2B57C4; text-decoration: none; font-weight: 600; }
  .web-link:hover { color: #15296B; text-decoration: underline; }
  .web-link svg { flex-shrink: 0; }
  .no-web { font-size: .78rem; color: #bbb; font-style: italic; }

  /* INDUSTRY COLORS */
  .ind-edu { background: #8E44AD; }
  .ind-sport { background: #27AE60; }
  .ind-health { background: #16A085; }
  .ind-car { background: #2980B9; }
  .ind-food { background: #E67E22; }
  .ind-retail { background: #C0392B; }
  .ind-mfg { background: #7F8C8D; }
  .ind-it { background: #2C3E50; }
  .ind-re { background: #1ABC9C; }
  .ind-fin { background: #F39C12; }
  .ind-media { background: #D35400; }
  .ind-mkt { background: #8E44AD; }
  .ind-ag { background: #27AE60; }
  .ind-trade { background: #2E86AB; }
  .ind-other { background: #95A5A6; }

  footer { text-align: center; padding: 24px; color: #aaa; font-size: .8rem; }
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="logo.jpg" alt="CXO TC8 Logo">
  <div class="header-text">
  <h1>CXO TC8</h1>
  <p>No Warrior Left Behind<br>我們不拋下任何一位夥伴</p>
  <div class="stats">
    <div class="stat"><div class="num" id="totalCount">61</div><div class="lbl">總成員數</div></div>
    <div class="stat"><div class="num">15+</div><div class="lbl">不同產業</div></div>
  </div>
  </div>
  <a class="edit-link" href="edit.html">✏️ 更新我的資料</a>
</div>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="🔍 搜尋姓名、公司、產業..." oninput="filterCards()">
  <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
  <button class="filter-btn" onclick="setFilter('edu', this)">教育</button>
  <button class="filter-btn" onclick="setFilter('health', this)">醫療保健</button>
  <button class="filter-btn" onclick="setFilter('food', this)">餐飲</button>
  <button class="filter-btn" onclick="setFilter('it', this)">資訊科技</button>
  <button class="filter-btn" onclick="setFilter('mfg', this)">製造業</button>
  <button class="filter-btn" onclick="setFilter('re', this)">不動產</button>
  <button class="filter-btn" onclick="setFilter('mkt', this)">行銷顧問</button>
  <button class="filter-btn" onclick="setFilter('has-web', this)">有官網</button>
  <div class="count-badge" id="visibleCount">顯示 61 人</div>
</div>

<div class="grid" id="cardGrid"></div>
<footer>CXO TC8 台中第 8 分會　·　2026 年度成員資料　·　資料來源：分會名單</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxda24yHBLXrum3p3CTiLkUTh3ZIE-4XOvAW06Ovy3oAdnx0Xmr-mmBfeRmGmCp5V2VsA/exec';
let members = [];
async function loadMembers() {
  const grid = document.getElementById('cardGrid');
  try {
    const res = await fetch(API_URL + '?action=members');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    members = data.members;
    buildCards();
  } catch (err) {
    grid.innerHTML = '<p style="padding:50px;color:#888;text-align:center">資料載入中或暫時無法取得，請稍後重整頁面。</p>';
  }
}

const avatarColors = {
  edu:"#8E44AD", sport:"#27AE60", health:"#16A085", car:"#2980B9",
  food:"#E67E22", retail:"#C0392B", mfg:"#7F8C8D", it:"#2C3E50",
  re:"#1ABC9C", fin:"#F39C12", media:"#D35400", mkt:"#8E44AD",
  ag:"#27AE60", trade:"#2E86AB", other:"#95A5A6"
};

let currentFilter = 'all';

function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  members.forEach((m, i) => {
    const color = avatarColors[m.industry] || '#95A5A6';
    const initial = m.name.charAt(0);
    const webHtml = m.web
      ? `<a class="web-link" href="${m.web}" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          ${m.web.replace(/https?:\/\//, '').replace(/\/$/, '')}
        </a>`
      : `<span class="no-web">尚無官方網站資料</span>`;

    const officerHtml = m.officer ? `<div class="officer">${m.officer}</div>` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.industry = m.industry;
    card.dataset.name = m.name;
    card.dataset.company = m.company;
    card.dataset.tag = m.tag;
    card.dataset.hasWeb = m.web ? 'yes' : 'no';
    card.innerHTML = `
      ${officerHtml}
      <div class="card-top">
        <div class="avatar" style="background:${color}">${initial}</div>
        <div class="name-block">
          <div class="name">${m.name}</div>
          <div class="role">${m.title}</div>
          <span class="industry-tag" style="background:${color}">${m.tag}</span>
        </div>
      </div>
      <div class="card-company">
        <div class="co-name">${m.company}</div>
        <div class="co-title">${m.title}</div>
      </div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-footer">${webHtml}</div>`;
    grid.appendChild(card);
  });
  updateCount();
}

function filterCards() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const matchSearch = !q
      || card.dataset.name.includes(q)
      || card.dataset.company.toLowerCase().includes(q)
      || card.dataset.tag.toLowerCase().includes(q)
      || card.querySelector('.card-desc').textContent.toLowerCase().includes(q);
    const matchFilter = currentFilter === 'all'
      || (currentFilter === 'has-web' && card.dataset.hasWeb === 'yes')
      || card.dataset.industry === currentFilter;
    card.classList.toggle('hidden', !(matchSearch && matchFilter));
  });
  updateCount();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function updateCount() {
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('visibleCount').textContent = `顯示 ${visible} 人`;
}

loadMembers();
</script>
</body>
</html>
