const avatarColors = {
  edu:"#8E44AD", sport:"#27AE60", health:"#16A085", car:"#2980B9",
  food:"#E67E22", retail:"#C0392B", mfg:"#7F8C8D", it:"#2C3E50",
  re:"#1ABC9C", fin:"#F39C12", media:"#D35400", mkt:"#8E44AD",
  ag:"#27AE60", trade:"#2E86AB", other:"#95A5A6"
};

let currentFilter = 'all';

function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  members.forEach((m, i) => {
    const color = avatarColors[m.industry] || '#95A5A6';
    const initial = m.name.charAt(0);
    const webHtml = m.web
      ? `<a class="web-link" href="${m.web}" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          ${m.web.replace(/https?:\/\//, '').replace(/\/$/, '')}
        </a>`
      : `<span class="no-web">尚無官方網站資料</span>`;

    const officerHtml = m.officer ? `<div class="officer">${m.officer}</div>` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.industry = m.industry;
    card.dataset.name = m.name;
    card.dataset.company = m.company;
    card.dataset.tag = m.tag;
    card.dataset.hasWeb = m.web ? 'yes' : 'no';
    card.innerHTML = `
      ${officerHtml}
      <div class="card-top">
        <div class="avatar" style="background:${color}">${initial}</div>
        <div class="name-block">
          <div class="name">${m.name}</div>
          <div class="role">${m.title}</div>
          <span class="industry-tag" style="background:${color}">${m.tag}</span>
        </div>
      </div>
      <div class="card-company">
        <div class="co-name">${m.company}</div>
        <div class="co-title">${m.title}</div>
      </div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-footer">${webHtml}</div>`;
    grid.appendChild(card);
  });
  updateCount();
}

function filterCards() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const matchSearch = !q
      || card.dataset.name.includes(q)
      || card.dataset.company.toLowerCase().includes(q)
      || card.dataset.tag.toLowerCase().includes(q)
      || card.querySelector('.card-desc').textContent.toLowerCase().includes(q);
    const matchFilter = currentFilter === 'all'
      || (currentFilter === 'has-web' && card.dataset.hasWeb === 'yes')
      || card.dataset.industry === currentFilter;
    card.classList.toggle('hidden', !(matchSearch && matchFilter));
  });
  updateCount();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function updateCount() {
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('visibleCount').textContent = `顯示 ${visible} 人`;
}

buildCards();
